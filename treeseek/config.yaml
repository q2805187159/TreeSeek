model: "gpt-4o-2024-11-20"
# model: "anthropic/claude-sonnet-4-6"
toc_check_page_num: 20
max_page_num_each_node: 10
max_token_num_each_node: 20000
if_add_node_id: "yes"
if_add_node_summary: "yes"
if_add_doc_description: "no"
if_add_node_text: "no"
index_backend: "inverted"
index_postings_backend: "bitmap"
index_include_text: "no"
query_default_top_k: 10
query_expand_ancestors: 1
query_leaf_only: "no"
weight_title: 5.0
weight_path: 3.5
weight_summary: 3.0
weight_prefix_summary: 2.5
weight_text: 1.0
bonus_exact_title: 5.0
bonus_phrase: 3.0
bonus_leaf: 1.0
bonus_all_terms_hit: 2.0
bonus_proximity: 1.5
bm25_k1: 1.2
bm25_b: 0.75
proximity_window: 12
diversity_penalty: 0.75
debug_explain_default: "no"
recursive_split_enabled: "yes"
recursive_split_min_pages: 4
recursive_split_min_tokens: 2000
recursive_split_max_depth: 3
recursive_split_heading_patterns:
  - "^\\d+\\.\\d+"
  - "^\\d+\\.\\d+\\.\\d+"
  - "^[A-Z][A-Za-z\\s\\-/]{3,}$"
snippet_max_chars: 320
snippet_context_chars: 120
